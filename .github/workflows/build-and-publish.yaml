---
name: Image Creation
on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      client_image_name:
        required: true
        type: string
      server_image_name:
        required: true
        type: string
      image_tags:
        required: false
        type: string
        default: ''

jobs:
  build_and_publish_client_and_server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for client
        id: meta_front
        if: ${{ inputs.image_tags == '' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.client_image_name }}

      - name: Extract metadata for client with custom tags
        id: meta_front_custom
        if: ${{ inputs.image_tags != '' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.client_image_name }}
          tags: ${{ inputs.image_tags }}

      - name: Extract metadata for server
        id: meta_back
        if: ${{ inputs.image_tags == '' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.server_image_name }}

      - name: Extract metadata for server with custom tags
        id: meta_back_custom
        if: ${{ inputs.image_tags != '' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.server_image_name }}
          tags: ${{ inputs.image_tags }}

      - name: Build and push client Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: client/Dockerfile.prod
          push: true
          tags: ${{ inputs.image_tags != '' && steps.meta_front_custom.outputs.tags || steps.meta_front.outputs.tags }}
          labels: ${{ inputs.image_tags != '' && steps.meta_front_custom.outputs.labels || steps.meta_front.outputs.labels }}

      - name: Build and push server Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile.prod
          push: true
          tags: ${{ inputs.image_tags != '' && steps.meta_back_custom.outputs.tags || steps.meta_back.outputs.tags }}
          labels: ${{ inputs.image_tags != '' && steps.meta_back_custom.outputs.labels || steps.meta_back.outputs.labels }}
